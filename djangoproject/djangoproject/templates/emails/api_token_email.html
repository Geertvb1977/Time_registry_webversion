<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      .button{display:inline-block;padding:14px 22px;background:#2563eb;color:#fff;border-radius:8px;text-decoration:none;font-weight:600}
      .container{max-width:600px;margin:0 auto;background:#fff;padding:20px;border-radius:8px;font-family:Arial,Helvetica,sans-serif;color:#111}
      .fallback{font-size:13px;color:#666;margin-top:18px}
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Toegang tot project "{{ project.project_name }}"</h2>
      <p>Je kunt op de knop hieronder klikken om de status van het project te bekijken.</p>
      <p style="text-align:center;margin:24px 0">
        <a class="button" href="{{ url }}">Bekijk projectstatus</a>
      </p>
      <p class="fallback">Werkt de knop niet? Kopieer en plak deze link in je browser:<br><a href="{{ url }}">{{ url }}</a></p>
      <hr style="border:none;border-top:1px solid #eee;margin:18px 0">
      <p style="font-size:12px;color:#888">Als je deze e-mail niet verwachtte, negeer deze dan.</p>
    </div>
  </body>
</html>
